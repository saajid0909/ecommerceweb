<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us - ShopEasy</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">

<a class="navbar-brand" href="index.html">ShopEasy</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="navbarNav">

<ul class="navbar-nav ms-auto">

<li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
<li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
<li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
<li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>

</ul>

</div>

</div>
</nav>

<!-- Contact -->

<div class="container mt-5">

<h2 class="text-center mb-4">Contact Us</h2>

<div class="row">

<div class="col-md-6">

<h4>Get in Touch</h4>

<p><strong>📍 Address:</strong> 123 Main Street, Chennai, India</p>

<p><strong>📞 Phone:</strong> +91 9876543210</p>

<p><strong>✉ Email:</strong> support@shopeasy.com</p>

<p>We are available Monday to Saturday from 9:00 AM to 6:00 PM.</p>

</div>

<div class="col-md-6">

<form id="contactForm">

<div class="mb-3">
<label class="form-label">Name</label>
<input type="text" id="name" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" id="email" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Subject</label>
<input type="text" id="subject" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Message</label>
<textarea id="message" class="form-control" rows="5" required></textarea>
</div>

<button type="submit" class="btn btn-primary">
Send Message
</button>

</form>

</div>

</div>

</div>

<!-- Footer -->

<footer class="bg-dark text-white text-center p-4 mt-5">

<p>© 2026 ShopEasy. All Rights Reserved.</p>

</footer>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script>
$(document).ready(function(){

$("#contactForm").submit(function(e){

e.preventDefault();

let name=$("#name").val();
let email=$("#email").val();
let subject=$("#subject").val();
let message=$("#message").val();

if(name=="" || email=="" || subject=="" || message==""){

alert("Please fill all fields.");

}else{

alert("Thank you! Your message has been sent.");

$("#contactForm")[0].reset();

}

});

});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script>

</body>
</html>
