<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout - ShopEasy</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">

<a class="navbar-brand" href="index.html">ShopEasy</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
<li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
<li class="nav-item"><a class="nav-link" href="cart.html">Cart</a></li>
<li class="nav-item"><a class="nav-link active" href="checkout.html">Checkout</a></li>
</ul>
</div>

</div>
</nav>

<!-- Checkout Form -->

<div class="container mt-5">

<h2 class="text-center mb-4">Checkout</h2>

<div class="row">

<div class="col-md-8">

<form>

<div class="mb-3">
<label class="form-label">Full Name</label>
<input type="text" class="form-control" placeholder="Enter your name" required>
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" class="form-control" placeholder="Enter your email" required>
</div>

<div class="mb-3">
<label class="form-label">Phone Number</label>
<input type="tel" class="form-control" placeholder="Enter phone number" required>
</div>

<div class="mb-3">
<label class="form-label">Shipping Address</label>
<textarea class="form-control" rows="4" placeholder="Enter address" required></textarea>
</div>

<div class="row">

<div class="col-md-6 mb-3">
<label class="form-label">City</label>
<input type="text" class="form-control" required>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">PIN Code</label>
<input type="text" class="form-control" required>
</div>

</div>

<div class="mb-3">
<label class="form-label">Payment Method</label>

<select class="form-select">

<option>Cash on Delivery</option>

<option>Credit Card</option>

<option>Debit Card</option>

<option>UPI</option>

<option>Net Banking</option>

</select>

</div>

<a href="confirmation.html" class="btn btn-success btn-lg">
Place Order
</a>

</form>

</div>

<!-- Order Summary -->

<div class="col-md-4">

<div class="card shadow">

<div class="card-body">

<h4>Order Summary</h4>

<hr>

<p>iPhone 16 Pro</p>

<p>₹79,999</p>

<hr>

<p>Smart Watch</p>

<p>₹9,999</p>

<hr>

<h5>Total</h5>

<h3 class="text-success">₹89,998</h3>

</div>

</div>

</div>

</div>

</div>

<!-- Footer -->

<footer class="bg-dark text-white text-center p-4 mt-5">
<p>© 2026 ShopEasy. All Rights Reserved.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="js/script.js"></script>

</body>
</html>
